<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport — critical for mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Theme color (Android Chrome toolbar + status bar) -->
    <meta name="theme-color" content="#6366f1" />
    <meta name="msapplication-TileColor" content="#0a0b1a" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CivicConnect" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

    <!-- SEO -->
    <title>CivicConnect AI — Smart Governance Platform</title>
    <meta name="description" content="AI-Powered Unified Citizen Services & Smart Governance Platform. File grievances, track resolutions, and access government services with AI intelligence." />
    <meta name="keywords" content="citizen services, government portal, grievance, AI, smart governance, PWA" />

    <!-- Open Graph (social sharing) -->
    <meta property="og:title" content="CivicConnect AI" />
    <meta property="og:description" content="AI-Powered Unified Citizen Services & Smart Governance" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
